<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720" role="img" aria-labelledby="title desc">
  <title id="title">8x8 Actuation-Rank Threshold Figure</title>
  <desc id="desc">Projected residual versus actuator count for corner wound, side patch, and central lesion on the 8x8 lattice, with the residual threshold epsilon equals one times ten to the minus four marked.</desc>
  <defs>
    <style>
      .bg { fill: #f6f2ea; }
      .panel { fill: #fffdf8; stroke: #d7cdbd; stroke-width: 2; }
      .axis { stroke: #5e5548; stroke-width: 2; }
      .grid { stroke: #d8d1c5; stroke-width: 1; stroke-dasharray: 5 7; }
      .tick { fill: #5e5548; font: 20px Georgia, "Times New Roman", serif; }
      .label { fill: #2b241b; font: 24px Georgia, "Times New Roman", serif; }
      .title { fill: #1e1a14; font: 34px Georgia, "Times New Roman", serif; font-weight: bold; }
      .subtitle { fill: #5e5548; font: 20px Georgia, "Times New Roman", serif; }
      .legend { fill: #2b241b; font: 21px Georgia, "Times New Roman", serif; }
      .note { fill: #5e5548; font: 18px Georgia, "Times New Roman", serif; }
      .threshold { stroke: #8f2d2d; stroke-width: 3; stroke-dasharray: 10 8; }
      .corner { fill: none; stroke: #0e7490; stroke-width: 4; }
      .side { fill: none; stroke: #b45309; stroke-width: 4; }
      .central { fill: none; stroke: #7c3aed; stroke-width: 4; }
      .dot-corner { fill: #0e7490; }
      .dot-side { fill: #b45309; }
      .dot-central { fill: #7c3aed; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="720" />
  <rect class="panel" x="48" y="48" width="1104" height="624" rx="24" />

  <text class="title" x="84" y="104">Hard threshold in actuator count on the 8x8 lattice</text>
  <text class="subtitle" x="84" y="136">Projected residual drops sharply only after enough independent stimulation sites are added.</text>

  <g transform="translate(110,180)">
    <rect x="0" y="0" width="790" height="430" fill="#fffdf8" />

    <line class="grid" x1="0" y1="42.5" x2="790" y2="42.5" />
    <line class="grid" x1="0" y1="150" x2="790" y2="150" />
    <line class="grid" x1="0" y1="257.5" x2="790" y2="257.5" />
    <line class="grid" x1="0" y1="365" x2="790" y2="365" />

    <line class="axis" x1="0" y1="430" x2="790" y2="430" />
    <line class="axis" x1="0" y1="0" x2="0" y2="430" />

    <line class="threshold" x1="0" y1="150" x2="790" y2="150" />
    <text class="note" x="610" y="143">threshold ε = 1e-4</text>

    <text class="tick" x="-18" y="371" text-anchor="end">1e-6</text>
    <text class="tick" x="-18" y="264" text-anchor="end">1e-5</text>
    <text class="tick" x="-18" y="156" text-anchor="end">1e-4</text>
    <text class="tick" x="-18" y="49" text-anchor="end">1e-3</text>

    <text class="label" x="-72" y="215" transform="rotate(-90 -72 215)">Projected residual</text>
    <text class="label" x="335" y="486">Actuator count k</text>

    <text class="tick" x="0" y="462" text-anchor="middle">1</text>
    <text class="tick" x="52.67" y="462" text-anchor="middle">2</text>
    <text class="tick" x="105.33" y="462" text-anchor="middle">3</text>
    <text class="tick" x="158" y="462" text-anchor="middle">4</text>
    <text class="tick" x="210.67" y="462" text-anchor="middle">5</text>
    <text class="tick" x="263.33" y="462" text-anchor="middle">6</text>
    <text class="tick" x="316" y="462" text-anchor="middle">7</text>
    <text class="tick" x="368.67" y="462" text-anchor="middle">8</text>
    <text class="tick" x="421.33" y="462" text-anchor="middle">9</text>
    <text class="tick" x="474" y="462" text-anchor="middle">10</text>
    <text class="tick" x="526.67" y="462" text-anchor="middle">11</text>
    <text class="tick" x="579.33" y="462" text-anchor="middle">12</text>
    <text class="tick" x="632" y="462" text-anchor="middle">13</text>
    <text class="tick" x="684.67" y="462" text-anchor="middle">14</text>
    <text class="tick" x="737.33" y="462" text-anchor="middle">15</text>
    <text class="tick" x="790" y="462" text-anchor="middle">16</text>

    <polyline class="corner" points="0,195.7 52.67,259.8 105.33,283.9 158,325.9 210.67,361.0 263.33,364.8 316,366.7 368.67,378.7 421.33,386.6 474,416.9 526.67,418.8 579.33,426.1 632,430 684.67,430 737.33,430 790,430" />
    <polyline class="side" points="0,134.4 52.67,144.9 105.33,176.4 158,202.2 210.67,218.1 263.33,241.7 316,254.8 368.67,267.2 421.33,285.0 474,300.8 526.67,311.7 579.33,321.7 632,349.0 684.67,430 737.33,430 790,430" />
    <polyline class="central" points="0,0 52.67,117.7 105.33,168.1 158,187.4 210.67,229.5 263.33,258.2 316,271.9 368.67,291.5 421.33,309.1 474,321.4 526.67,337.8 579.33,352.4 632,381.4 684.67,430 737.33,430 790,430" />

    <circle class="dot-corner" cx="0" cy="195.7" r="5.5" />
    <circle class="dot-corner" cx="52.67" cy="259.8" r="5.5" />
    <circle class="dot-corner" cx="158" cy="325.9" r="5.5" />
    <circle class="dot-side" cx="52.67" cy="144.9" r="5.5" />
    <circle class="dot-side" cx="105.33" cy="176.4" r="5.5" />
    <circle class="dot-side" cx="158" cy="202.2" r="5.5" />
    <circle class="dot-central" cx="52.67" cy="117.7" r="5.5" />
    <circle class="dot-central" cx="105.33" cy="168.1" r="5.5" />
    <circle class="dot-central" cx="158" cy="187.4" r="5.5" />
  </g>

  <g transform="translate(935,205)">
    <text class="legend" x="0" y="0">8x8 threshold summary</text>

    <line class="corner" x1="4" y1="42" x2="56" y2="42" />
    <circle class="dot-corner" cx="30" cy="42" r="5.5" />
    <text class="legend" x="72" y="49">Corner wound</text>
    <text class="note" x="72" y="75">Greedy threshold rank: 2</text>

    <line class="side" x1="4" y1="120" x2="56" y2="120" />
    <circle class="dot-side" cx="30" cy="120" r="5.5" />
    <text class="legend" x="72" y="127">Side patch</text>
    <text class="note" x="72" y="153">Greedy threshold rank: 3</text>

    <line class="central" x1="4" y1="198" x2="56" y2="198" />
    <circle class="dot-central" cx="30" cy="198" r="5.5" />
    <text class="legend" x="72" y="205">Central lesion</text>
    <text class="note" x="72" y="231">Greedy threshold rank: 3</text>

    <text class="note" x="0" y="298">Exact result at k = 2:</text>
    <text class="note" x="0" y="324">side-patch steering is infeasible</text>
    <text class="note" x="0" y="350">for every one of the 2,016 pairs.</text>

    <text class="note" x="0" y="412">Main message:</text>
    <text class="legend" x="0" y="442">below a critical actuator count,</text>
    <text class="legend" x="0" y="470">more stimulation does not help.</text>
  </g>
</svg>
